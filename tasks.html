<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Academics Organizer - Requirements Hub</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body class="dark-mode">
    
    <div class="dashboard-container" id="dashboard-app-root">
      
      <!-- Sidebar Navigation -->
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <span class="sidebar-title">AcademEcZ App</span>
        </div>
        
        <nav class="sidebar-nav">
          <a href="/index.html" class="nav-item" id="nav-overview">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="7" height="9" />
              <rect x="14" y="3" width="7" height="5" />
              <rect x="14" y="12" width="7" height="9" />
              <rect x="3" y="16" width="7" height="5" />
            </svg>
            <span>Overview</span>
          </a>
          
          <a href="/subjects.html" class="nav-item" id="nav-subjects">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" />
              <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" />
            </svg>
            <span>Subjects</span>
          </a>
          
          <a href="/tasks.html" class="nav-item active" id="nav-tasks">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 11l3 3L22 4" />
              <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11" />
            </svg>
            <span>Requirements</span>
          </a>
          
          <a href="/calendar.html" class="nav-item" id="nav-calendar">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
              <line x1="16" y1="2" x2="16" y2="6" />
              <line x1="8" y1="2" x2="8" y2="6" />
              <line x1="3" y1="10" x2="21" y2="10" />
            </svg>
            <span>Calendar</span>
          </a>

          <a href="/settings.html" class="nav-item" id="nav-settings">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="3" />
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
            </svg>
            <span>Settings</span>
          </a>
        </nav>
      </aside>
      
      <!-- Main Content Stage -->
      <div class="main-wrapper">
        
        <!-- Header Controls -->
        <header class="header">
          <button class="mobile-menu-btn" id="mobile-menu-btn">☰</button>
          
          <div class="search-bar">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8" />
              <line x1="21" y1="21" x2="16.65" y2="16.65" />
            </svg>
            <input type="text" id="tasks-search-input" placeholder="Search assignment topic or subject..." />
          </div>
          
          <div class="header-actions">
            <!-- Theme Toggler Action -->
            <button class="header-btn" id="theme-toggle-btn" title="Toggle Light/Dark Mode">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" id="theme-toggle-icon">
                <!-- Loaded via shared JS -->
              </svg>
            </button>
          </div>
        </header>
        
        <!-- Main Content Area Views -->
        <main class="content-area">
          
          <div id="tasks-view" class="view-pane active">
            
            <!-- Welcome Banner -->
            <div class="welcome-banner" style="background: linear-gradient(135deg, #111827, #1e293b); margin-bottom: 24px;">
              <div class="welcome-text">
                <h1>Coursework Requirements Hub</h1>
                <p>Register deadlines, map them to enrolled semester subjects, and organize homeworks, laboratories, and deliverables.</p>
              </div>
            </div>

            <!-- Tasks layout grid -->
            <div class="tasks-layout">
              
              <!-- Left Column: Tasks Lists and Tabs (span-1) -->
              <div>
                <div class="subjects-header-bar" style="margin-bottom: 16px;">
                  <div class="subject-filters" id="task-status-filters">
                    <button class="pill-btn active" data-status="All">All Requirements</button>
                    <button class="pill-btn" data-status="Pending">Pending</button>
                    <button class="pill-btn" data-status="Completed">Completed</button>
                  </div>
                  <span id="tasks-count-badge" style="font-size:0.8rem; font-weight:600; font-family:var(--font-mono); color:var(--text-muted);">0 Tasks Listed</span>
                </div>

                <div class="task-list" id="requirements-tasks-list">
                  <!-- Rendered dynamically -->
                </div>
              </div>

              <!-- Right Column: Registration card (span-2) -->
              <div class="panel-card" style="position: sticky; top: 94px;">
                <div class="panel-card-header">
                  <span class="panel-title">Register Requirement</span>
                </div>
                <div class="panel-card-body">
                  <form id="register-task-form" style="display:flex; flex-direction:column; gap:16px;">
                    <div>
                      <label style="display:block; font-size:0.8rem; font-weight:600; margin-bottom:6px; color:var(--text-secondary);">Task Title / Objective</label>
                      <input type="text" id="task-title" placeholder="e.g. Lab report 2" required style="width:100%; padding:10px; background:var(--bg-primary); border:1px solid var(--border-color); border-radius:6px; color:var(--text-primary); font-size:0.85rem;" />
                    </div>

                    <div>
                      <label style="display:block; font-size:0.8rem; font-weight:600; margin-bottom:6px; color:var(--text-secondary);">Subject Link</label>
                      <select id="task-subject" required style="width:100%; padding:10px; background:var(--bg-primary); border:1px solid var(--border-color); border-radius:6px; color:var(--text-primary); font-size:0.85rem; cursor:pointer;">
                        <!-- Filled dynamically -->
                      </select>
                    </div>

                    <div>
                      <label style="display:block; font-size:0.8rem; font-weight:600; margin-bottom:6px; color:var(--text-secondary);">Priority Scale</label>
                      <select id="task-priority" style="width:100%; padding:10px; background:var(--bg-primary); border:1px solid var(--border-color); border-radius:6px; color:var(--text-primary); font-size:0.85rem; cursor:pointer;">
                        <option value="Low">Low</option>
                        <option value="Medium" selected>Medium</option>
                        <option value="High">High</option>
                      </select>
                    </div>

                    <div>
                      <label style="display:block; font-size:0.8rem; font-weight:600; margin-bottom:6px; color:var(--text-secondary);">Submission Deadline</label>
                      <input type="date" id="task-duedate" required style="width:100%; padding:10px; background:var(--bg-primary); border:1px solid var(--border-color); border-radius:6px; color:var(--text-primary); font-size:0.85rem; font-family:var(--font-sans);" />
                    </div>

                    <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; padding:10px 0; font-weight:600; margin-top:8px;">+ Log Requirement</button>
                  </form>
                </div>
              </div>

            </div>
            
          </div>
          
        </main>
      </div>
    </div>

    <!-- Multi-page javascript bundle link -->
    <script type="module" src="/src/tasks.js"></script>
  </body>
</html>
