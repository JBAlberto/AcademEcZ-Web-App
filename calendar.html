<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Academics Organizer - Weekly Calendar</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body class="dark-mode">
    <div class="dashboard-container" id="dashboard-app-root">
      <!-- Sidebar Navigation -->
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <span class="sidebar-title">AcademEcZ App</span>
        </div>

        <nav class="sidebar-nav">
          <a href="/index.html" class="nav-item" id="nav-overview">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="7" height="9" />
              <rect x="14" y="3" width="7" height="5" />
              <rect x="14" y="12" width="7" height="9" />
              <rect x="3" y="16" width="7" height="5" />
            </svg>
            <span>Overview</span>
          </a>

          <a href="/subjects.html" class="nav-item" id="nav-subjects">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" />
              <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" />
            </svg>
            <span>Subjects</span>
          </a>

          <a href="/tasks.html" class="nav-item" id="nav-tasks">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 11l3 3L22 4" />
              <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11" />
            </svg>
            <span>Requirements</span>
          </a>

          <a href="/calendar.html" class="nav-item active" id="nav-calendar">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
              <line x1="16" y1="2" x2="16" y2="6" />
              <line x1="8" y1="2" x2="8" y2="6" />
              <line x1="3" y1="10" x2="21" y2="10" />
            </svg>
            <span>Calendar</span>
          </a>

          <a href="/settings.html" class="nav-item" id="nav-settings">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="3" />
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
            </svg>
            <span>Settings</span>
          </a>
        </nav>
      </aside>

      <!-- Main Content Stage -->
      <div class="main-wrapper">
        <header class="header">
          <button class="mobile-menu-btn" id="mobile-menu-btn">☰</button>

          <div style="flex-grow: 1;"></div>

          <div class="header-actions">
            <button class="header-btn" id="theme-toggle-btn" title="Toggle Light/Dark Mode">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" id="theme-toggle-icon">
                <!-- Loaded via shared JS -->
              </svg>
            </button>
          </div>
        </header>

        <main class="content-area">
          <div class="panel-card" style="margin-bottom:24px;">
            <div class="panel-card-header">
              <span class="panel-title">Weekly Schedule</span>
              <div style="font-family: var(--font-mono); font-size:0.75rem; color: var(--text-muted);" id="calendar-week-title"></div>
            </div>

            <div class="panel-card-body" style="padding:24px;">
              <div style="display:flex; justify-content:space-between; align-items:center; gap:8px; margin-bottom:10px;">
                <div style="font-family: var(--font-mono); font-size:0.65rem; color: var(--text-muted);" id="calendar-range-subtitle"></div>
                <div style="display:flex; gap:6px;">
                  <button id="calendar-prev-btn" class="btn" style="padding:4px 8px; font-size:0.75rem; border-radius:8px;">‹</button>
                  <button id="calendar-next-btn" class="btn" style="padding:4px 8px; font-size:0.75rem; border-radius:8px;">›</button>
                </div>
              </div>

              <div id="weekly-calendar" class="weekly-calendar" style="margin-bottom:16px;"></div>

              <form id="calendar-editor-form" style="display:flex; flex-direction:column; gap:10px; max-width: 560px;">
                <input type="text" id="cal-day" style="display:none;" />
                <input type="text" id="cal-time" style="display:none;" />

                <input
                  type="text"
                  id="cal-activity"
                  placeholder="Activity (e.g., Lecture, Lab, Review)"
                  style="width:100%; padding:10px 10px; border-radius:10px; border: 1px solid var(--border-color); background: var(--bg-primary); color: var(--text-primary); font-size:0.85rem;"
                />

                <div style="display:flex; gap:8px;">
                  <button type="button" id="cal-no-class-btn" class="btn btn-secondary" style="flex:1; justify-content:center; padding:8px 10px; font-size:0.75rem;">No class</button>
                  <button type="button" id="cal-clear-override-btn" class="btn btn-secondary" style="flex:1; justify-content:center; padding:8px 10px; font-size:0.75rem; display:none;">Clear</button>
                </div>

                <button type="submit" class="btn btn-primary" style="justify-content:center;">Save</button>
                <button type="button" id="calendar-reset-btn" class="btn btn-secondary" style="justify-content:center; font-size:0.75rem;">Reset week</button>
              </form>
            </div>
          </div>

          <div class="panel-card">
            <div class="panel-card-header">
              <span class="panel-title">Next up</span>
            </div>
            <div class="panel-card-body" id="dashboard-next-up" style="padding:16px;">
              <!-- Rendered dynamically -->
            </div>
          </div>
        </main>
      </div>
    </div>

    <script type="module" src="/src/calendar.js"></script>
  </body>
</html>
